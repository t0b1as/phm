
<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pendelhub Controller</title>
</head>
<body style="background-color:#293133;">

<h2 style="color: gray;">Pendelhub Controller</h2>

Hub<br>
<input type="range" id="hub" min="10" max="250"><br>

Speed<br>
<input type="range" id="speed" min="0" max="300"><br>

Center<br>
<input type="range" id="center" min="0" max="300"><br>

Acceleration<br>
<input type="range" id="acc" min="0" max="500"><br>

Force<br>
<input type="range" id="force" min="0" max="500"><br>

<button onclick="startPendulum()">Start</button>
<button onclick="calibrate()">Calibrate</button>

<script src="dashboard.js"></script>

</body>
</html>
